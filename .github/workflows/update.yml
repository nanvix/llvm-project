name: update

on:
  schedule:
    # Runs daily at midnight PST (UTC-8). GitHub Actions cron uses UTC, so 08:00 UTC = 00:00 PST.
    - cron: '0 8 * * *'
  workflow_dispatch:

# Global environment variables for this workflow
env:
  # GitHub usernames (comma-separated for multiple) that should be requested as PR reviewers.
  PR_REVIEWERS: ppenna

jobs:
  update-z:
    name: Check and update z utility
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          # Ensure unified helper script is executable
          chmod +x .z/update.sh

      - name: Run unified update script
        id: update
        run: |
          set -euo pipefail
          .z/update.sh \
            https://api.github.com/repos/nanvix/gcc/releases/latest \
            'nanvix-gcc-.*-stage1\.tar\.bz2$' \
            'nanvix-gcc-([0-9]+\.[0-9]+\.[0-9]+)-([0-9a-fA-F]+)-stage1\.tar\.bz2' \
            GCC
          echo "Outputs:"
          echo "  changed=${{ steps.update.outputs.changed }}"
          echo "  version=${{ steps.update.outputs.version }}"
          echo "  short_hash=${{ steps.update.outputs.short_hash }}"
          echo "  asset_digest=${{ steps.update.outputs.asset_digest }}"
          echo "  updated_vars=${{ steps.update.outputs.updated_vars }}"
          if [ "${{ steps.update.outputs.changed }}" = "true" ]; then
            echo "Git diff:"
            git --no-pager diff --name-only
          fi

      - name: Create branch and open Pull Request
        if: steps.update.outputs.changed == 'true' && steps.update.outputs.no_asset == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(z): update GCC to ${{ steps.update.outputs.version }}-${{ steps.update.outputs.short_hash }}"
          branch: "update/gcc-${{ steps.update.outputs.version }}-${{ steps.update.outputs.short_hash }}"
          title: "Update GCC to ${{ steps.update.outputs.version }}-${{ steps.update.outputs.short_hash }}"
          body: |
            This PR updates the `z` utility to use the latest release of `nanvix/gcc` (${{ steps.update.outputs.version }}-${{ steps.update.outputs.short_hash }}).

            - Updated variables: ${{ steps.update.outputs.updated_vars }}

            Generated automatically by the update workflow.
          base: dev
          labels: automated,update
          reviewers: ${{ env.PR_REVIEWERS }}
