name: CI/CD Pipeline

#==================================================================================================
# Trigger Conditions
#==================================================================================================

on:
  pull_request:
    types:
      - 'opened'
      - 'synchronize'
      - 'reopened'
      - 'ready_for_review'
    branches:
      - 'dev'

  push:
    branches:
      - 'dev'

  repository_dispatch:
    types:
      - binutils-release
      - newlib-clang-release

# Cancel previous running actions for the same PR (but not for releases)
concurrency:
  group: ${{ github.event_name == 'repository_dispatch' && 'release-llvm' || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'repository_dispatch' && github.ref != 'refs/heads/dev' }}

#==================================================================================================
# Environment Variables
#==================================================================================================

env:
  # Version of LLVM.
  LLVM_VERSION: "21.0.0"
  # Directory where LLVM will be installed.
  INSTALL_LOCATION: /opt/nanvix

#==================================================================================================
# Jobs
#==================================================================================================

jobs:

  #================================================================================================
  # Build Job
  #================================================================================================

  build:
    # Only run for push/PR events (not repository_dispatch).
    # For PRs, only run for non-draft PRs with allowed branch prefixes.
    if: |
      github.event_name != 'repository_dispatch' && (
        github.event_name != 'pull_request' ||
        (
          !github.event.pull_request.draft &&
          (
            startsWith(github.head_ref, 'enhancement-') ||
            startsWith(github.head_ref, 'feature-') ||
            startsWith(github.head_ref, 'bugfix-') ||
            startsWith(github.head_ref, 'dependabot/') ||
            startsWith(github.head_ref, 'copilot/')
          )
        )
      )
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore sccache cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: ${{ runner.os }}-sccache
        restore-keys: |
          ${{ runner.os }}-sccache

    - name: Enable Compiler Caching
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install dependencies
      run: sudo ./z setup

    - name: Configure LLVM (stage 0)
      run: ./z configure --install-location=${{ env.INSTALL_LOCATION }} --stage=0

    - name: Build LLVM (stage 0)
      run: ./z build

    - name: Install LLVM (stage 0)
      run: ./z install

    - name: Configure LLVM (stage 1)
      run: ./z configure --install-location=${{ env.INSTALL_LOCATION }} --sysroot-location=${{ env.INSTALL_LOCATION }} --stage=1
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Build LLVM (stage 1)
      run: ./z build

    - name: Install LLVM (stage 1)
      run: ./z install

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        ls -l /dev/kvm

    - name: Verify libc++ artifacts
      run: ./z verify

    - name: "Smoke test: compile and link C and C++ programs"
      run: ./z test

  #================================================================================================
  # Release Job
  #================================================================================================

  release:
    # Only run for repository_dispatch events.
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: dev
        fetch-depth: 0

    - name: Setup Git configuration
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Determine build stage
      id: stage
      run: |
        EVENT_TYPE="${{ github.event.action }}"
        if [ "$EVENT_TYPE" = "binutils-release" ]; then
          echo "stage=0" >> $GITHUB_OUTPUT
          echo "stage_label=stage0" >> $GITHUB_OUTPUT
          echo "dispatch_target=nanvix/newlib" >> $GITHUB_OUTPUT
          echo "dispatch_event=llvm-stage0-release" >> $GITHUB_OUTPUT
        elif [ "$EVENT_TYPE" = "newlib-clang-release" ]; then
          echo "stage=1" >> $GITHUB_OUTPUT
          echo "stage_label=stage1" >> $GITHUB_OUTPUT
          echo "dispatch_target=nanvix/toolchain-clang" >> $GITHUB_OUTPUT
          echo "dispatch_event=llvm-stage1-release" >> $GITHUB_OUTPUT
        fi

    - name: Get commit information
      id: commit_info
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        STAGE_LABEL="${{ steps.stage.outputs.stage_label }}"
        TAG_NAME="nanvix-v${{ env.LLVM_VERSION }}-${SHORT_SHA}-${STAGE_LABEL}"
        RELEASE_NAME="nanvix-llvm-${{ env.LLVM_VERSION }}-${SHORT_SHA}-${STAGE_LABEL}"
        LLVM_BRANCH="nanvix/v${{ env.LLVM_VERSION }}"
        echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
        echo "llvm_branch=${LLVM_BRANCH}" >> $GITHUB_OUTPUT

    - name: Check if release already exists
      id: check_release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG_NAME="${{ steps.commit_info.outputs.tag_name }}"
        if git tag -l "${TAG_NAME}" | grep -q .; then
          echo "tag_exists=true" >> $GITHUB_OUTPUT
          if gh release view "${TAG_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${TAG_NAME} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${TAG_NAME} exists but GitHub Release does not; continuing to recover from partial previous run."
          fi
        else
          echo "tag_exists=false" >> $GITHUB_OUTPUT
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    #----------------------------------------------------------------------------------------------
    # Download Dependencies
    #----------------------------------------------------------------------------------------------

    - name: Download Binutils release
      if: steps.check_release.outputs.exists == 'false' && github.event_name == 'repository_dispatch'
      run: |
        set -euo pipefail
        BINUTILS_TAG="${{ github.event.client_payload.binutils_tag }}"
        echo "Fetching Binutils release: ${BINUTILS_TAG}..."
        RELEASE_JSON=$(curl -fsS \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/nanvix/binutils/releases/tags/${BINUTILS_TAG}")

        ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("nanvix-binutils-.*\\.tar\\.bz2$")) | .browser_download_url' | head -n1)
        if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
          echo "::error::No binutils tarball asset found for tag ${BINUTILS_TAG}"
          exit 1
        fi
        echo "Downloading Binutils from: $ASSET_URL"

        curl -fsS -L -o /tmp/nanvix-binutils.tar.bz2 "$ASSET_URL"
        sudo mkdir -p ${{ env.INSTALL_LOCATION }}
        sudo tar -xjf /tmp/nanvix-binutils.tar.bz2 -C ${{ env.INSTALL_LOCATION }}
        echo "Binutils extracted to ${{ env.INSTALL_LOCATION }}"

    - name: Download Newlib release
      if: steps.check_release.outputs.exists == 'false' && steps.stage.outputs.stage == '1'
      run: |
        set -euo pipefail
        NEWLIB_TAG="${{ github.event.client_payload.newlib_tag }}"
        echo "Fetching Newlib release: ${NEWLIB_TAG}..."
        RELEASE_JSON=$(curl -fsS \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/nanvix/newlib/releases/tags/${NEWLIB_TAG}")

        ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("nanvix-newlib-.*\\.tar\\.bz2$")) | .browser_download_url' | head -n1)
        if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
          echo "::error::No newlib tarball asset found for tag ${NEWLIB_TAG}"
          exit 1
        fi
        echo "Downloading Newlib from: $ASSET_URL"

        curl -fsS -L -o /tmp/nanvix-newlib.tar.bz2 "$ASSET_URL"
        sudo tar -xjf /tmp/nanvix-newlib.tar.bz2 -C ${{ env.INSTALL_LOCATION }}
        echo "Newlib extracted to ${{ env.INSTALL_LOCATION }}"

    - name: Download LLVM stage 0 release
      if: steps.check_release.outputs.exists == 'false' && steps.stage.outputs.stage == '1'
      run: |
        set -euo pipefail
        STAGE0_TAG="${{ github.event.client_payload.llvm_tag }}"
        echo "Fetching LLVM stage 0 release: ${STAGE0_TAG}..."
        RELEASE_JSON=$(curl -fsS \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/${STAGE0_TAG}")

        ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("nanvix-llvm-.*-stage0\\.tar\\.bz2$")) | .browser_download_url' | head -n1)
        if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
          echo "::error::No LLVM stage0 tarball asset found for tag ${STAGE0_TAG}"
          exit 1
        fi
        echo "Downloading LLVM stage 0 from: $ASSET_URL"

        curl -fsS -L -o /tmp/nanvix-llvm-stage0.tar.bz2 "$ASSET_URL"
        sudo tar -xjf /tmp/nanvix-llvm-stage0.tar.bz2 -C ${{ env.INSTALL_LOCATION }}
        echo "LLVM stage 0 extracted to ${{ env.INSTALL_LOCATION }}"

    #----------------------------------------------------------------------------------------------
    # Build
    #----------------------------------------------------------------------------------------------

    - name: Restore sccache cache
      if: steps.check_release.outputs.exists == 'false'
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: ${{ runner.os }}-sccache-release-${{ steps.stage.outputs.stage_label }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-sccache-release-${{ steps.stage.outputs.stage_label }}-
          ${{ runner.os }}-sccache

    - name: Enable Compiler Caching
      if: steps.check_release.outputs.exists == 'false'
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install dependencies
      if: steps.check_release.outputs.exists == 'false'
      run: sudo ./z setup

    - name: Configure build
      if: steps.check_release.outputs.exists == 'false'
      run: ./z configure --install-location=${{ env.INSTALL_LOCATION }} --sysroot-location=${{ env.INSTALL_LOCATION }} --release-name=${{ steps.commit_info.outputs.release_name }} --stage=${{ steps.stage.outputs.stage }}

    - name: Build
      if: steps.check_release.outputs.exists == 'false'
      run: ./z build

    - name: Install
      if: steps.check_release.outputs.exists == 'false'
      run: ./z install

    #----------------------------------------------------------------------------------------------
    # Release Artifacts
    #----------------------------------------------------------------------------------------------

    - name: Create release archive
      if: steps.check_release.outputs.exists == 'false'
      run: ./z release

    #----------------------------------------------------------------------------------------------
    # Docker Image
    #----------------------------------------------------------------------------------------------

    - name: Prepare Docker context
      if: steps.check_release.outputs.exists == 'false'
      run: |
        mkdir -p ./docker-install
        cp -r "${{ env.INSTALL_LOCATION }}/." ./docker-install/

    - name: Set up Docker Buildx
      if: steps.check_release.outputs.exists == 'false'
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      if: steps.check_release.outputs.exists == 'false'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine Docker tags
      if: steps.check_release.outputs.exists == 'false'
      id: docker_tags
      run: |
        SHORT_SHA="${{ steps.commit_info.outputs.short_sha }}"
        STAGE="${{ steps.stage.outputs.stage }}"
        if [ "$STAGE" = "0" ]; then
          echo "tags=ghcr.io/nanvix/llvm-project:stage0-latest,ghcr.io/nanvix/llvm-project:stage0-${SHORT_SHA}" >> $GITHUB_OUTPUT
        else
          echo "tags=ghcr.io/nanvix/llvm-project:latest,ghcr.io/nanvix/llvm-project:${SHORT_SHA}" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Docker image
      if: steps.check_release.outputs.exists == 'false'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.docker_tags.outputs.tags }}

    - name: Make package public
      if: steps.check_release.outputs.exists == 'false'
      run: |
        curl -fsS -X PATCH \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/llvm-project" \
          -d '{"visibility":"public"}' || true

    #----------------------------------------------------------------------------------------------
    # Git Operations
    #----------------------------------------------------------------------------------------------

    - name: Fast-forward release branch
      if: steps.check_release.outputs.exists == 'false'
      run: |
        git fetch origin
        git checkout -B ${{ steps.commit_info.outputs.llvm_branch }} origin/dev
        git push origin ${{ steps.commit_info.outputs.llvm_branch }}

    - name: Create release tag
      if: steps.check_release.outputs.exists == 'false' && steps.check_release.outputs.tag_exists == 'false'
      run: |
        git tag ${{ steps.commit_info.outputs.tag_name }}
        git push origin ${{ steps.commit_info.outputs.tag_name }}

    - name: Create GitHub Release
      if: steps.check_release.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.commit_info.outputs.tag_name }}
        name: "${{ steps.commit_info.outputs.tag_name }}"
        body: |
          Automated release of Nanvix LLVM ${{ env.LLVM_VERSION }} (${{ steps.stage.outputs.stage_label }})

          Built from commit: ${{ steps.commit_info.outputs.short_sha }}
          Triggered by: ${{ github.event.action || 'workflow_run' }}

          This release contains the LLVM toolchain configured for the Nanvix operating system target (i686-nanvix).

          **Artifacts:**
          - Tarball: `${{ steps.commit_info.outputs.release_name }}.tar.bz2`
          - Docker: `${{ steps.docker_tags.outputs.tags }}`
        files: |
          ${{ steps.commit_info.outputs.release_name }}.tar.bz2
        draft: false
        prerelease: false

    #----------------------------------------------------------------------------------------------
    # Cross-Repository Dispatch
    #----------------------------------------------------------------------------------------------

    - name: Dispatch to next repository
      if: steps.check_release.outputs.exists == 'false' && steps.stage.outputs.dispatch_target != ''
      run: |
        curl -fsS -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
          https://api.github.com/repos/${{ steps.stage.outputs.dispatch_target }}/dispatches \
          -d '{
            "event_type": "${{ steps.stage.outputs.dispatch_event }}",
            "client_payload": {
              "llvm_version": "${{ env.LLVM_VERSION }}",
              "llvm_tag": "${{ steps.commit_info.outputs.tag_name }}",
              "llvm_sha": "${{ steps.commit_info.outputs.short_sha }}",
              "llvm_stage": "${{ steps.stage.outputs.stage }}",
              "binutils_tag": "${{ github.event.client_payload.binutils_tag }}",
              "newlib_tag": "${{ github.event.client_payload.newlib_tag }}"
            }
          }'

  #================================================================================================
  # Update Pinned Tags Job
  #================================================================================================

  update-pinned-tags:
    needs: release
    if: github.event_name == 'repository_dispatch' && github.event.action == 'newlib-clang-release'
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: dev

    - name: Setup Git configuration
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Update release tags
      id: update
      env:
        NEWLIB_TAG: ${{ github.event.client_payload.newlib_tag }}
      run: |
        set -euo pipefail

        # Validate tag format to prevent sed injection.
        if [[ -n "${NEWLIB_TAG:-}" ]] && ! [[ "${NEWLIB_TAG}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
          echo "::error::Invalid NEWLIB_TAG format: '${NEWLIB_TAG}'"
          exit 1
        fi

        CHANGES=""

        if [[ -n "${NEWLIB_TAG:-}" ]]; then
          CURRENT=$(grep -oP 'readonly NEWLIB_RELEASE_TAG="\K[^"]+' z)
          if [[ "${CURRENT}" != "${NEWLIB_TAG}" ]]; then
            sed -i "s|^readonly NEWLIB_RELEASE_TAG=\".*\"|readonly NEWLIB_RELEASE_TAG=\"${NEWLIB_TAG}\"|" z
            CHANGES="${CHANGES}NEWLIB_RELEASE_TAG: ${CURRENT} -> ${NEWLIB_TAG}"$'\n'
          fi
        fi

        if [[ -n "${CHANGES}" ]]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          printf '%s' "${CHANGES}" > /tmp/tag_changes.txt
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No pinned tags to update."
        fi

    - name: Create pull request
      if: steps.update.outputs.has_changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      run: |
        BRANCH="feature-update-release-tags-$(date +%Y%m%d%H%M%S)"
        git checkout -b "${BRANCH}"
        git add z
        git commit -m "ci: update pinned release tags in z"
        git push origin "${BRANCH}"

        cat > /tmp/pr_body.md <<'PREOF'
        Automated PR to update pinned dependency tags in the `z` build script.

        **Changes:**
        PREOF
        cat /tmp/tag_changes.txt >> /tmp/pr_body.md

        gh pr create \
          --base dev \
          --head "${BRANCH}" \
          --title "ci: update pinned release tags" \
          --body-file /tmp/pr_body.md
