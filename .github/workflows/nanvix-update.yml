name: nanvix-update

on:
  schedule:
    # Runs daily at midnight PST (UTC-8). GitHub Actions cron uses UTC, so 08:00 UTC = 00:00 PST.
    - cron: '0 8 * * *'
  workflow_dispatch:

# Global environment variables for this workflow
env:
  # GitHub usernames (comma-separated for multiple) that should be requested as PR reviewers.
  PR_REVIEWERS: ppenna

jobs:
  update-z:
    name: Check and update z utility
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Run update command
        id: update
        run: |
          set -euo pipefail
          ./z update

      - name: Create branch and open Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(z): update Nanvix release to ${{ steps.update.outputs.tag }}"
          branch: "update/nanvix-${{ steps.update.outputs.tag }}"
          title: "Update Nanvix release to ${{ steps.update.outputs.tag }}"
          body: |
            This PR updates the `z` utility to pin the latest release of `nanvix/nanvix` (${{ steps.update.outputs.tag }}).

            Generated automatically by the update workflow.
          base: dev
          labels: automated,update
          reviewers: ${{ env.PR_REVIEWERS }}
