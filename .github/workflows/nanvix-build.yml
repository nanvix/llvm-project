name: CI/CD Pipeline

#==================================================================================================
# Trigger Conditions
#==================================================================================================

on:
  pull_request:
    types:
      - 'opened'
      - 'synchronize'
      - 'reopened'
      - 'ready_for_review'
    branches:
      - 'dev'

  push:
    branches:
      - 'dev'

# Cancel previous running actions for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/dev' }}

#==================================================================================================
# Environment Variables
#==================================================================================================

env:
  # Directory where LLVM will be installed.
  INSTALL_LOCATION: /opt/nanvix

#==================================================================================================
# Jobs
#==================================================================================================

jobs:
  build:
    # Only run the CI for:
    # - Pushes to 'dev' (handled by workflow triggers above)
    # - Non-draft PRs where the source branch starts with one of:
    #     'enhancement-', 'feature-', 'bugfix-', 'dependabot/', or 'copilot/'
    if: |
      github.event_name != 'pull_request' ||
      (
        !github.event.pull_request.draft &&
        (
          startsWith(github.head_ref, 'enhancement-') ||
          startsWith(github.head_ref, 'feature-') ||
          startsWith(github.head_ref, 'bugfix-') ||
          startsWith(github.head_ref, 'dependabot/') ||
          startsWith(github.head_ref, 'copilot/')
        )
      )
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore sccache cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: ${{ runner.os }}-sccache
        restore-keys: |
          ${{ runner.os }}-sccache

    - name: Enable Compiler Caching
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install dependencies
      run: sudo ./z setup

    - name: Configure LLVM (stage 0)
      run: ./z configure --install-location=${{ env.INSTALL_LOCATION }} --stage=0

    - name: Build LLVM (stage 0)
      run: ./z build

    - name: Install LLVM (stage 0)
      run: ./z install

    - name: Configure LLVM (stage 1)
      run: ./z configure --install-location=${{ env.INSTALL_LOCATION }} --sysroot-location=${{ env.INSTALL_LOCATION }} --stage=1
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Build LLVM (stage 1)
      run: ./z build

    - name: Install LLVM (stage 1)
      run: ./z install

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        ls -l /dev/kvm

    - name: Verify libc++ artifacts
      run: ./z verify

    - name: "Smoke test: compile and link C and C++ programs"
      run: ./z test
