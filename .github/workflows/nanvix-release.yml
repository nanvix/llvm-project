name: Release Pipeline

#==================================================================================================
# Trigger Conditions
#==================================================================================================

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches:
      - dev

#==================================================================================================
# Environment Variables
#==================================================================================================

env:
  # Version of LLVM.
  LLVM_VERSION: "21.0.0"
  # Directory where LLVM will be installed.
  RELEASE_INSTALL_LOCATION: /opt/nanvix

#==================================================================================================
# Jobs
#==================================================================================================

jobs:
  release:
    # Only run if the triggering workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    permissions:
      contents: write  # Required for creating releases, tags, and updating branches

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_branch }}  # Check out the branch that triggered the workflow
        fetch-depth: 0                                     # Fetch all history for branch operations

    - name: Setup Git configuration
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Restore sccache cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: ${{ runner.os }}-sccache
        restore-keys: |
          ${{ runner.os }}-sccache

    - name: Enable Compiler Caching
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install dependencies
      run: sudo ./z setup

    - name: Get commit information
      id: commit_info
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        TAG_NAME="nanvix-v${{ env.LLVM_VERSION }}-${SHORT_SHA}"
        RELEASE_NAME="nanvix-llvm-${{ env.LLVM_VERSION }}-${SHORT_SHA}"
        LLVM_BRANCH="nanvix/v${{ env.LLVM_VERSION }}"
        echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
        echo "llvm_branch=${LLVM_BRANCH}" >> $GITHUB_OUTPUT

    - name: Configure build
      run: ./z configure --install-location=${{ env.RELEASE_INSTALL_LOCATION }} --release-name=${{ steps.commit_info.outputs.release_name }}

    - name: Create release archive
      run: ./z release

    - name: Fast-forward ${{ steps.commit_info.outputs.llvm_branch }} branch to dev
      run: |
        git fetch origin
        git checkout -B ${{ steps.commit_info.outputs.llvm_branch }} origin/dev
        git push origin ${{ steps.commit_info.outputs.llvm_branch }}

    - name: Create release tag
      run: |
        git tag ${{ steps.commit_info.outputs.tag_name }}
        git push origin ${{ steps.commit_info.outputs.tag_name }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.commit_info.outputs.tag_name }}
        name: "${{ steps.commit_info.outputs.tag_name }}"
        body: |
          Automated release of Nanvix LLVM ${{ env.LLVM_VERSION }}

          Built from commit: ${{ github.sha }}

          This release contains the complete LLVM toolchain configured for the Nanvix operating system target (i686-nanvix).
        files: |
          ${{ steps.commit_info.outputs.release_name }}.tar.bz2
        draft: false
        prerelease: false
